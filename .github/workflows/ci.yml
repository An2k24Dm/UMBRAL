name: CI

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend (.NET 9)
    runs-on: ubuntu-latest
    env:
      COBERTURA_ESTRICTA: "false"
    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Configurar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Ejecutar pruebas y cobertura
        shell: pwsh
        run: |
          if ($env:COBERTURA_ESTRICTA -eq 'true') {
            ./verificar-backend.ps1 -Silencioso -CoberturaMinima 90 -ExigirCobertura
          }
          else {
            ./verificar-backend.ps1 -Silencioso -CoberturaMinima 90
          }

      - name: Publicar resultados de pruebas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: artifacts/test-results
          if-no-files-found: warn

  frontend-web:
    name: Frontend web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-web/umbral-web-react
    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-web/umbral-web-react/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar
        run: npm run build

  frontend-movil:
    name: Frontend móvil
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-movil/umbral-app-react-native
    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-movil/umbral-app-react-native/package-lock.json

      - name: Instalar dependencias
        run: npm ci --legacy-peer-deps

      - name: Verificar TypeScript
        run: npm run typecheck
